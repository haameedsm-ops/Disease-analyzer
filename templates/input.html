<!DOCTYPE html>
<html>
<head>
    <title>Enter Symptoms</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="box">
    <h1>🧬 Disease Analyzer</h1>
    <h2>Enter Your Symptoms</h2>

    <form action="/predict" method="post">
        <input type="text" name="s1" placeholder="Symptom 1" required><br>
        <input type="text" name="s2" placeholder="Symptom 2" required><br>
        <input type="text" name="s3" placeholder="Symptom 3" required><br>
        <input type="text" name="s4" placeholder="Symptom 4" required><br>

        <button type="submit">Analyze</button>
    </form>
</div>

</body>
</html>
